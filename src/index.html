<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>计时器</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="main.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="timer-section">
      <div id="timer" class="timer">03:00</div>
    </div>

    <div id="error-msg" class="error"></div>
    <div id="tab-list" class="tab-list"></div>

    <div class="region-bar">
      <button id="select-region-btn">框选截取区域</button>
      <span id="region-status" class="region-status">未设置</span>
    </div>
  </div>

  <!-- Fullscreen overlay for region selection -->
  <div id="select-overlay" class="select-overlay" style="display:none">
    <canvas id="select-canvas"></canvas>
    <div class="select-hint">拖拽框选需要截取的区域，松开确认</div>
  </div>

  <div class="version">v0.3.0</div>
</body>
</html>
